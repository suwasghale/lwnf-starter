{% load i18n %}

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        L.W.N.F
        {% endblock %}
    </title>
</head>

<body style="
margin:0;
padding:0;
background:#f4f6f8;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
color:#1f2937;
">

<table role="presentation"
       cellpadding="0"
       cellspacing="0"
       width="100%"
       style="padding:40px 20px;">

<tr>
<td align="center">

<table role="presentation"
       cellpadding="0"
       cellspacing="0"
       width="600"
       style="
       max-width:600px;
       width:100%;
       background:#ffffff;
       border-radius:12px;
       overflow:hidden;
       border:1px solid #e5e7eb;
       ">

<!-- ========================================================= -->
<!-- HEADER -->
<!-- ========================================================= -->

<tr>
<td
style="
background:#0f172a;
padding:32px;
text-align:center;
">

<h1
style="
margin:0;
font-size:30px;
color:#ffffff;
font-weight:700;
letter-spacing:2px;
">

L.W.N.F

</h1>

<p
style="
margin-top:10px;
font-size:15px;
color:#cbd5e1;
">

Little World Népal France (LWNF)

</p>

</td>
</tr>

<!-- ========================================================= -->
<!-- BODY -->
<!-- ========================================================= -->

<tr>

<td
style="
padding:40px;
line-height:1.8;
font-size:16px;
">

{% block content %}

{% endblock %}

</td>

</tr>

<!-- ========================================================= -->
<!-- FOOTER -->
<!-- ========================================================= -->

<tr>

<td
style="
background:#f8fafc;
padding:30px;
font-size:13px;
color:#64748b;
text-align:center;
border-top:1px solid #e5e7eb;
">

<p style="margin:0 0 12px 0;">

Association L.W.N.F

</p>

<p style="margin:0 0 12px 0;">

Ce message a été envoyé automatiquement.
Merci de ne pas répondre directement à cet e-mail.

</p>

<p style="margin:0;">

© {% now "Y" %} L.W.N.F — Tous droits réservés.

</p>

</td>

</tr>

</table>

</td>

</tr>

</table>

</body>

</html>
